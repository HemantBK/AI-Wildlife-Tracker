# ─── Wildlife Tracker - Docker Compose ───────────────────────────
# One-command startup for the full application stack.
#
# Usage:
#   docker-compose up --build          # Build and start all services
#   docker-compose up -d               # Start in background
#   docker-compose logs -f api         # Follow API logs
#   docker-compose down                # Stop all services
#
# Services:
#   api       — FastAPI REST API (port 8000)
#   frontend  — Streamlit query UI (port 8501)
#   dashboard — Streamlit monitoring dashboard (port 8502)

version: "3.9"

services:
  # ─── API Server ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wildlife-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      # Mount data directory so indexes persist across restarts
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; r = requests.get('http://localhost:8000/health', timeout=5); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ─── Streamlit Frontend ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wildlife-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ─── Monitoring Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wildlife-dashboard
    ports:
      - "8502:8501"
    environment:
      - API_BASE=http://api:8000
    command: >
      streamlit run src/frontend/dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
