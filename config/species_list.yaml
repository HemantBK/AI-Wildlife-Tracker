# Target species groups for Indian wildlife
# This list seeds the data collection scripts

taxonomic_groups:
  birds:
    description: "Indian bird species"
    target_count: 400
    search_terms:
      - "Indian birds"
      - "birds of India"
    sample_species:
      - "Indian Peafowl"
      - "Indian Robin"
      - "Oriental Magpie-Robin"
      - "Common Kingfisher"
      - "Indian Roller"
      - "White-throated Kingfisher"
      - "Asian Paradise Flycatcher"
      - "Indian Pitta"
      - "Greater Flamingo"
      - "Sarus Crane"
      - "Indian Vulture"
      - "Black Kite"
      - "Crested Serpent Eagle"
      - "Spotted Owlet"
      - "Indian Grey Hornbill"
      - "Coppersmith Barbet"
      - "Rose-ringed Parakeet"
      - "House Sparrow"
      - "Common Myna"
      - "Red-vented Bulbul"
      - "Purple Sunbird"
      - "Indian Cormorant"
      - "Painted Stork"
      - "Black-headed Ibis"
      - "Brahminy Kite"

  mammals:
    description: "Indian mammal species"
    target_count: 150
    search_terms:
      - "Indian mammals"
      - "mammals of India"
    sample_species:
      - "Bengal Tiger"
      - "Indian Elephant"
      - "Indian Rhinoceros"
      - "Asiatic Lion"
      - "Indian Leopard"
      - "Snow Leopard"
      - "Sloth Bear"
      - "Indian Wild Dog"
      - "Indian Pangolin"
      - "Nilgiri Tahr"
      - "Indian Bison"
      - "Blackbuck"
      - "Chital"
      - "Sambar Deer"
      - "Indian Flying Fox"
      - "Rhesus Macaque"
      - "Hanuman Langur"
      - "Lion-tailed Macaque"
      - "Red Panda"
      - "Indian Wolf"

  reptiles:
    description: "Indian reptile species"
    target_count: 100
    search_terms:
      - "Indian reptiles"
      - "reptiles of India"
    sample_species:
      - "King Cobra"
      - "Indian Cobra"
      - "Indian Python"
      - "Mugger Crocodile"
      - "Gharial"
      - "Saltwater Crocodile"
      - "Indian Star Tortoise"
      - "Monitor Lizard"
      - "Indian Chameleon"
      - "Russell's Viper"
      - "Common Krait"
      - "Olive Ridley Sea Turtle"
