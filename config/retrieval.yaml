# Retrieval configuration - versioned
# Change log:
#   v1 (Phase 1): Initial config

version: 1

# Embedding model
embedding:
  model_name: "all-MiniLM-L6-v2"  # Will compare with BGE-small-en in Phase 3
  batch_size: 64

# ChromaDB
vector_store:
  collection_name: "wildlife_chunks"
  persist_directory: "./data/chroma_db"
  distance_metric: "cosine"

# BM25
bm25:
  k1: 1.5
  b: 0.75

# Hybrid search
retrieval:
  top_k_vector: 15
  top_k_bm25: 15
  fusion_k: 60  # RRF parameter
  reranker_top_n: 5
  reranker_threshold: 0.01

# Re-ranker
reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# LLM
llm:
  # Local (Ollama)
  local_model: "llama3.2:3b"
  local_base_url: "http://localhost:11434"
  # API (Groq)
  groq_model: "llama-3.1-8b-instant"
  # Inference settings
  temperature: 0.1
  max_tokens: 1024
  timeout_seconds: 60
  chunk_count_for_llm: 5

# Geographic filtering
geographic:
  enabled: true
  strict: false  # If true, filter out species not in user's region
